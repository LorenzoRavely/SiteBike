<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doctor Bikes — Acesso Restrito</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --yellow: #F5C800;
      --yellow-dim: #C9A400;
      --dark: #0D0D0D;
      --dark2: #141414;
      --dark3: #1C1C1C;
      --card: #181818;
      --border: rgba(245,200,0,0.15);
      --text: #E8E8E8;
      --muted: #888;
      --white: #fff;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* ── FUNDO ── */
    .bg-grid {
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(245,200,0,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(245,200,0,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 20%, transparent 75%);
      pointer-events: none;
    }

    .bg-glow {
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 50% 50% at 50% 50%, rgba(245,200,0,0.05) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Roda decorativa de fundo */
    .bg-wheel {
      position: fixed;
      width: 700px; height: 700px;
      border-radius: 50%;
      border: 1px solid rgba(245,200,0,0.05);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      animation: spin 40s linear infinite;
    }

    .bg-wheel::before {
      content: '';
      position: absolute; inset: 60px;
      border-radius: 50%;
      border: 1px solid rgba(245,200,0,0.04);
    }

    @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }

    /* ── CARD DE LOGIN ── */
    .login-wrap {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 420px;
      padding: 20px;
      animation: fadeUp .6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .login-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 44px 40px;
      position: relative;
      overflow: hidden;
    }

    .login-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--yellow), transparent);
    }

    /* Logo */
    .login-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      letter-spacing: 2px;
      color: var(--white);
      margin-bottom: 6px;
    }

    .login-logo span { color: var(--yellow); }

    .logo-icon {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--yellow);
      display: grid;
      place-items: center;
      color: var(--dark);
    }

    .login-subtitle {
      font-size: .78rem;
      color: var(--muted);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 36px;
    }

    /* Badge acesso restrito */
    .login-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: rgba(245,200,0,0.07);
      border: 1px solid rgba(245,200,0,0.2);
      border-left: 3px solid var(--yellow);
      color: var(--yellow);
      padding: 6px 14px;
      border-radius: 2px;
      font-size: .7rem;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    /* Campos */
    .field {
      margin-bottom: 18px;
    }

    .field label {
      display: block;
      font-size: .72rem;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .field input {
      width: 100%;
      background: var(--dark2);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 13px 16px;
      color: var(--text);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: .9rem;
      outline: none;
      transition: border-color .25s, box-shadow .25s;
    }

    .field input:focus {
      border-color: rgba(245,200,0,0.4);
      box-shadow: 0 0 0 3px rgba(245,200,0,0.07);
    }

    .field input::placeholder { color: #444; }

    /* Botão */
    .btn-login {
      width: 100%;
      background: var(--yellow);
      color: var(--dark);
      border: none;
      border-radius: 8px;
      padding: 14px;
      font-family: 'Syne', sans-serif;
      font-size: .95rem;
      font-weight: 700;
      letter-spacing: .5px;
      cursor: pointer;
      transition: all .25s;
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-login:hover {
      background: #fff;
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(245,200,0,0.2);
    }

    .btn-login:active { transform: translateY(0); }

    /* Mensagem de erro */
    .erro-msg {
      background: rgba(220, 50, 50, 0.1);
      border: 1px solid rgba(220, 50, 50, 0.25);
      border-radius: 6px;
      padding: 10px 14px;
      font-size: .78rem;
      color: #ff6b6b;
      margin-top: 14px;
      display: none;
      align-items: center;
      gap: 8px;
    }

    .erro-msg.visivel { display: flex; }

    /* Footer do card */
    .login-footer {
      margin-top: 32px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      text-align: center;
    }

    .login-footer a {
      font-size: .78rem;
      color: var(--muted);
      text-decoration: none;
      transition: color .2s;
    }

    .login-footer a:hover { color: var(--yellow); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--dark2); }
    ::-webkit-scrollbar-thumb { background: var(--yellow); border-radius: 2px; }

    @media (max-width: 480px) {
      .login-card { padding: 32px 24px; }
      .bg-wheel { width: 400px; height: 400px; }
    }
  </style>
</head>
<body>

  <div class="bg-grid"></div>
  <div class="bg-glow"></div>
  <div class="bg-wheel"></div>

  <div class="login-wrap">
    <div class="login-card">

      <div class="login-logo">
        <div class="logo-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
          </svg>
        </div>
        Doctor <span>Bikes</span>
      </div>
      <div class="login-subtitle">Painel do Administrador</div>

      <div class="login-badge">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        Acesso restrito
      </div>

      <div class="field">
        <label for="usuario">Usuário</label>
        <input type="text" id="usuario" placeholder="daniel" autocomplete="username">
      </div>

      <div class="field">
        <label for="senha">Senha</label>
        <input type="password" id="senha" placeholder="••••••••" autocomplete="current-password">
      </div>

      <button class="btn-login" onclick="fazerLogin()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
          <polyline points="10 17 15 12 10 7"/>
          <line x1="15" y1="12" x2="3" y2="12"/>
        </svg>
        Entrar no painel
      </button>

      <div class="erro-msg" id="erroMsg">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        Usuário ou senha incorretos.
      </div>

      <div class="login-footer">
        <a href="index.html">← Voltar ao site</a>
      </div>

    </div>
  </div>

  <!-- Scripts do Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>

  <script>
    async function fazerLogin() {
      const email = document.getElementById('usuario').value.trim(); // Mudamos o placeholder de user para email na lógica
      const senha = document.getElementById('senha').value;
      const erroMsg = document.getElementById('erroMsg');
      const btn = document.querySelector('.btn-login');

      // Modifica botão para estado de carregamento
      const textoOriginal = btn.innerHTML;
      btn.innerHTML = 'Entrando...';
      btn.disabled = true;

      // Autenticação no Supabase
      const { data, error } = await supabaseClient.auth.signInWithPassword({
        email: email,
        password: senha
      });

      if (error) {
        // Se der erro (senha incorreta ou email)
        erroMsg.classList.add('visivel');
        document.getElementById('senha').value = '';
        document.getElementById('senha').focus();
        setTimeout(() => erroMsg.classList.remove('visivel'), 3000);
        
        btn.innerHTML = textoOriginal;
        btn.disabled = false;
      } else {
        // Sucesso no login, redireciona para o painel
        window.location.href = 'dashboard.html';
      }
    }

    // Permite login pressionando Enter
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') fazerLogin();
    });

    // Se já está logado no Supabase, vai direto pro dashboard
    window.onload = async () => {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (session) {
        window.location.href = 'dashboard.html';
      }
    };
  </script>

</body>
</html>
